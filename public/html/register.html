<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Đăng ký</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="auth-page">
  <div class="particle-layer" aria-hidden="true"></div>
  <div class="auth-shell">
    <div class="auth-card pulse-border">
      <div class="auth-badge">MMO VIP</div>
      <h2>Đăng ký</h2>
      <p class="auth-desc">Tạo tài khoản ngay để nhận ưu đãi khủng.</p>
      <div class="form-group">
        <label>Tên đăng nhập</label>
        <input id="username" placeholder="Nhập tên đăng nhập">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input id="email" type="email" placeholder="Nhập email">
      </div>
      <div class="form-group">
        <label>Mật khẩu</label>
        <input id="password" type="password" placeholder="Nhập mật khẩu">
      </div>
      <button class="glow-button" onclick="register()">Đăng ký</button>
      <p class="auth-switch">Đã có tài khoản? <a href="login.html">Đăng nhập</a></p>
    </div>
  </div>
  <script src="../js/register.js"></script>
  <script src="../js/particles.js"></script>
</body>
</html>
