<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quên mật khẩu</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="page-header">
    <h1>Quên mật khẩu</h1>
    <nav>
      <a href="/html/login.html">Đăng nhập</a>
      <a href="/html/register.html">Đăng ký</a>
    </nav>
  </header>

  <main class="page-container">
    <div class="auth-section">
      <h2>Quên mật khẩu</h2>
      <div class="form-group">
        <label>Email</label>
        <input id="email" type="email" placeholder="Nhập email của bạn">
      </div>
      <button onclick="forgotPassword()">Gửi yêu cầu</button>
      <p id="message"></p>
      <div id="reset-form" style="display:none;">
        <div class="form-group">
          <label>Token reset</label>
          <input id="reset-token" placeholder="Nhập token từ email">
        </div>
        <div class="form-group">
          <label>Mật khẩu mới</label>
          <input id="new-password" type="password" placeholder="Mật khẩu mới">
        </div>
        <button onclick="resetPassword()">Reset mật khẩu</button>
      </div>
    </div>
  </main>

  <script src="/js/forgot.js"></script>
</body>
</html>
