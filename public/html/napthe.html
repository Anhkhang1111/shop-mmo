<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Nạp thẻ</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="page-header">
    <h1>Nạp thẻ</h1>
    <nav>
      <a href="/html/mucluc.html">Trang chủ</a>
      <a href="/html/shop.html">Shop</a>
      <a href="/html/hoso.html">Hồ sơ</a>
    </nav>
  </header>

  <main class="page-container">
    <div class="form-group">
      <label>Seri</label>
      <input id="seri" placeholder="Nhập seri thẻ">
    </div>
    <div class="form-group">
      <label>Code</label>
      <input id="code" placeholder="Nhập mã thẻ">
    </div>
    <div class="form-group">
      <label>Số tiền</label>
      <input id="amount" type="number" placeholder="Nhập mệnh giá">
    </div>
    <button onclick="submitNapthe()">Gửi yêu cầu nạp thẻ</button>
    <p id="napthe-status"></p>
  </main>

  <script src="../js/napthe.js"></script>

</html>
