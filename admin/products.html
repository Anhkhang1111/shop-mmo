<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Admin Products</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <h2>Admin VIP</h2>
      <a href="dashboard.html">Dashboard</a>
      <a href="products.html" class="active">Sản phẩm</a>
      <a href="users.html">Người dùng</a>
      <a href="orders.html">Đơn hàng</a>
      <a href="napthe.html">Nạp thẻ</a>
    </aside>
    <main class="admin-content">
      <div class="admin-banner">
        <h1>Quản lý sản phẩm</h1>
        <p>Thêm, sửa, hoặc xóa sản phẩm cho cửa hàng.</p>
      </div>
      <div class="admin-card">
        <form id="product-form">
          <div class="form-group">
            <label>Tên sản phẩm</label>
            <input id="product-name" placeholder="Tên sản phẩm">
          </div>
          <div class="form-group">
            <label>Giá</label>
            <input id="product-price" type="number" placeholder="Giá sản phẩm">
          </div>
          <div class="form-group">
            <label>Hình ảnh</label>
            <input id="product-image-file" type="file" accept="image/*">
            <input id="product-image" type="hidden" placeholder="Đường dẫn ảnh">
          </div>
          <div class="form-group">
            <label>Mô tả</label>
            <textarea id="product-description" rows="4" placeholder="Mô tả sản phẩm"></textarea>
          </div>
          <button type="button" class="admin-action" onclick="createProduct()">Thêm sản phẩm</button>
        </form>
      </div>
      <div class="admin-card" style="margin-top:24px;">
        <h2>Danh sách sản phẩm</h2>
        <table class="admin-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tên</th>
              <th>Giá</th>
              <th>Ảnh</th>
              <th>Hành động</th>
            </tr>
          </thead>
          <tbody id="product-table"></tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="products.js"></script>
</body>
</html>
